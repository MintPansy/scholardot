logging:
  level:
    swyp.paperdot.translator: DEBUG

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# GPT-5 mini 연동을 위한 OpenAI API 설정
openai:
  api:
    key: ${OPENAI_API_KEY} # .env 파일이나 환경 변수에서 값을 읽어옵니다.
    #model: "gpt-3.5-turbo-1106"
    model: "gpt-5-mini" # 사용할 LLM 모델입니다.
    url: "https://api.openai.com/v1/chat/completions" # OpenAI 채팅 완료를 위한 엔드포인트입니다.





# 시스템 메시지 설정
openai.api.system-message: '당신은 문서 요약을 전문으로 하는 유용한 어시스턴트입니다.  '

ncp:
  storage:
    region: ${NCP_REGION}
    endpoint: ${NCP_ENDPOINT}
    accessKey: ${NCP_ACCESS_KEY}
    secretKey: ${NCP_SECRET_KEY}
    bucket: ${NCP_BUCKET}

translation:
  # 배치당 문장 수(첫 배치는 first-batch-size). 작을수록 부분 완료·폴링 UI가 빨리 갱신됨.
  batch-size: 15
  first-batch-size: 8
  max-chars-per-batch: 8000
  cache:
    enabled: true
    max-entries: 100000
  executor:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 200

paperdot:
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  # 문서 복잡도 점수 v1: score = weight-math * mathCount + weight-image * imageCount + weight-length * avgParagraphLength(문자)
  complexity:
    weight-math: 4.0
    weight-image: 2.0
    weight-length: 0.015
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-seconds: 3600
    refresh-ttl-seconds: 604800
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:refresh_token}
